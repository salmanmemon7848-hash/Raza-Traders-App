[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "build"

[build.environment]
  # This tells react-scripts to treat warnings as warnings, not errors
  CI = "false"
  NODE_ENV = "production"

[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.vercel.app/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
